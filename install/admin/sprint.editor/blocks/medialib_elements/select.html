<div class="sp-source">
    <div class="sp-filter">
        <select class="sp-select-types">
            <option value="">нет</option>
            {{~it.medialib_types :item}}
            <option {{?item.code== it.medialib_type}}selected="selected" {{?}} value="{{!item.code}}">[{{!item.code}}] {{!item.name}}</option>
            {{~}}
        </select>
        <select class="sp-select-collection">
            <option value="">нет</option>
            {{~it.collections :item}}
            <option {{?item.id== it.collection_id}}selected="selected" {{?}} value="{{!item.id}}">[{{!item.id}}] {{!item.title}}</option>
            {{~}}
        </select>

        {{?it.collection_id && it.page_cnt}}
        <span class="sp-x-btn sp-nav-left sp-x-btn-rounded">&larr;</span>
        <span class="sp-x-btn sp-nav-right sp-x-btn-rounded">&rarr;</span>
        {{=it.page_num}}/{{=it.page_cnt}}
        {{?}}
    </div>
    {{?it.collection_id && it.page_cnt}}
    <div class="sp-collection sp-clear">
        {{=it.source_html}}
    </div>
    <div title="Перетащите элементы вниз для их выбора" class="sp-arrows">&darr;&darr;&darr;</div>
    {{?}}
</div>
<div class="sp-elements sp-clear">
    {{=it.elements_html}}
</div>
